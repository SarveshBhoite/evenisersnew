name: Deploy to Sub-Branches

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy Backend Sub-branch
        run: |
          git subtree split --prefix backend -b backend-deploy-local
          git push origin backend-deploy-local:backend-deploy --force

      - name: Deploy Frontend Sub-branch
        run: |
          git subtree split --prefix frontend -b frontend-deploy-local
          git push origin frontend-deploy-local:frontend-deploy --force
